name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install ruff
      - run: ruff check odooctl tests

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e '.[dev,api]' pytest-cov
      - name: Run unit tests
        run: pytest -q --cov=odooctl --cov-report=term-missing --cov-fail-under=80

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build
      - name: Smoke-install wheel
        run: |
          pip install dist/*.whl
          odooctl --version
          odooctl --help > /dev/null
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

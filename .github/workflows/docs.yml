name: Docs

on:
  push:
    branches: [master]
    paths: ['docs/**', 'mkdocs.yml', 'README.md', 'landing/**', '.github/workflows/docs.yml']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Build site
        run: |
          pip install mkdocs-material
          # index.md is generated from README.md at build time. README uses
          # GitHub-relative links (docs/foo.md, CONTRIBUTING.md); rewrite them
          # to the in-site paths and stage the root governance files.
          cp CONTRIBUTING.md CODE_OF_CONDUCT.md SECURITY.md LICENSING.md SUPPORT.md docs/ 2>/dev/null || true
          sed -E 's#\]\(docs/#](#g' README.md > docs/index.md
          # Landing page at the site root; MkDocs docs under /docs/.
          mkdocs build --strict --site-dir site/docs
          cp landing/index.html site/index.html
      # The site lives at odooctl.github.io (org site), so it must be served
      # from the odooctl/odooctl.github.io repo; push the built site there.
      - name: Deploy to odooctl/odooctl.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.PAGES_DEPLOY_KEY }}
          external_repository: odooctl/odooctl.github.io
          publish_branch: master
          publish_dir: site

name: odooctl deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - production
          - staging
      branch:
        description: Git branch to deploy
        required: true
        default: main
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce branch/environment mapping
        run: |
          case "${{ inputs.environment }}" in
            production) expected_branch="main" ;;
            staging) expected_branch="staging" ;;
            *) echo "::error::Unknown environment '${{ inputs.environment }}'"; exit 1 ;;
          esac
          if [ "${{ inputs.branch }}" != "$expected_branch" ]; then
            echo "::error::Branch '${{ inputs.branch }}' is not allowed for environment '${{ inputs.environment }}' (expected '$expected_branch')"
            exit 1
          fi
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install odooctl
        run: pip install .
      - name: Validate config
        run: odooctl validate --config odooctl.yml
      - name: Deploy
        env:
          ODOO_DB_PASSWORD: ${{ secrets.ODOO_DB_PASSWORD }}
        run: |
          odooctl deploy ${{ inputs.environment }} --branch ${{ inputs.branch }} --config odooctl.yml

site_name: odooctl
site_description: CLI-first, Odoo-aware control plane for self-hosted Odoo on Docker Compose
site_url: https://rami-0.github.io/odooctl/
repo_url: https://github.com/Rami-0/odooctl
repo_name: Rami-0/odooctl
edit_uri: edit/master/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      toggle:
        icon: material/weather-night
        name: Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      toggle:
        icon: material/weather-sunny
        name: Light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting started:
      - Installation: installation.md
      - Getting started: getting-started.md
      - Configuration: configuration.md
      - Execution modes: execution-modes.md
      - Examples: examples.md
  - Operations:
      - Deployment: deployment.md
      - Backup & restore: backup-restore.md
      - Staging clones: staging-clone.md
      - Rollback: rollback.md
      - Environments: environments.md
      - Doctor: doctor.md
      - Disaster recovery: disaster-recovery.md
      - Odoo versions: odoo-versions.md
      - Migration & upgrades: migration.md
  - Platform:
      - Web UI: web-ui.md
      - API: api.md
      - Runner architecture: runner-architecture.md
      - Domains & SSL: domains-ssl.md
      - Catalog: catalog.md
  - Security:
      - Security notes: security.md
      - RBAC: rbac.md
  - Project:
      - Contributing: CONTRIBUTING.md
      - Code of conduct: CODE_OF_CONDUCT.md
      - Security policy: SECURITY.md

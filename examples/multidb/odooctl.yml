project:
  name: local-multidb-example
  odoo_version: "19.0"

runtime:
  type: docker_compose
  compose_file: docker-compose.yml
  reverse_proxy: none
  execution_mode: docker

postgres:
  user: odoo
  password_env: ODOO_DB_PASSWORD
  service: db
  internal_host: db

backups:
  local_path: backups

odoo:
  image: odoo:19.0
  config_path: /etc/odoo/odoo.conf
  service: odoo
  db_host: db
  db_user: odoo
  db_password_env: ODOO_DB_PASSWORD
  filestore_container_path: /var/lib/odoo
  without_demo: "True"
  addons_paths:
    - /mnt/extra-addons

environments:
  production:
    stack: local
    branch: main
    scheme: http
    domain: localhost
    port: 8069
    db_selector: true
    db_name: odoo_prod
    filestore_path: filestore/odoo_prod
    filestore_volume: odoo-data
    update_modules:
      - base
  staging:
    stack: local
    branch: staging
    scheme: http
    domain: localhost
    port: 8069
    db_selector: true
    db_name: odoo_staging
    filestore_path: filestore/odoo_staging
    filestore_volume: odoo-data
    clone_from: production
    sanitize: true
    update_modules:
      - base

sanitization:
  disable_mail_servers: true
  disable_fetchmail: true
  disable_crons: true
  rewrite_base_url: true
  disable_payment_providers: true
  disable_queue_jobs: true
  purge_mail_queue: true
  temp_db_suffix: _incoming

healthcheck:
  scheme: http
  path: /web/health
  retries: 12
  interval_seconds: 3

redaction:
  min_secret_length: 6
  ignore_values:
    - odoo
    - admin
    - postgres

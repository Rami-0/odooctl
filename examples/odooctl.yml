project:
  name: demo-odoo-project
  odoo_version: "19.0"

runtime:
  type: docker_compose
  compose_file: docker-compose.yml
  reverse_proxy: traefik

postgres:
  host: localhost
  port: 5432
  user: odoo
  password_env: ODOO_DB_PASSWORD

backups:
  local_path: backups
  remote:
    type: s3
    bucket: demo-odoo-backups
    endpoint_env: ODOO_S3_ENDPOINT
    access_key_env: ODOO_S3_ACCESS_KEY
    secret_key_env: ODOO_S3_SECRET_KEY
    region: eu-central-1
    prefix: demo-odoo

redaction:
  min_secret_length: 6
  ignore_values:
    - odoo
    - admin
    - postgres

odoo:
  image: registry.example.com/odoo:19.0
  config_path: /etc/odoo/odoo.conf
  service: odoo
  addons_paths:
    - /mnt/extra-addons
    - /opt/odoo/custom-addons

environments:
  production:
    branch: main
    domain: odoo.example.com
    db_name: odoo_prod
    filestore_path: /var/lib/odoo/filestore/odoo_prod
    update_modules:
      - sale
      - stock
  staging:
    branch: staging
    domain: staging.odoo.example.com
    db_name: odoo_staging
    filestore_path: /var/lib/odoo/filestore/odoo_staging
    clone_from: production
    sanitize: true
    update_modules:
      - sale
      - stock
      - custom_module

sanitization:
  # Run Odoo's own `odoo-bin neutralize` first (Odoo >= 16); the SQL below
  # supplements it (third-party modules, secrets, base URL rewrite).
  use_odoo_neutralize: true
  sql_files:
    - .sanitize/staging.sql
    - .sanitize/disable_connectors.sql
  disable_mail_servers: true
  disable_fetchmail: true
  disable_crons: true
  rewrite_base_url: true
  disable_payment_providers: true
  disable_queue_jobs: true
  purge_mail_queue: true
  temp_db_suffix: _incoming

healthcheck:
  path: /web/health
  timeout_seconds: 5
  retries: 12
  interval_seconds: 5

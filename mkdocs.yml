site_name: odooctl
site_description: CLI-first, Odoo-aware control plane for self-hosted Odoo on Docker Compose
site_url: https://rami-0.github.io/odooctl/docs/
repo_url: https://github.com/Rami-0/odooctl
repo_name: Rami-0/odooctl
edit_uri: edit/master/docs/

# Vercel-style dark theme: near-black, hairline borders, Geist type.
theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font:
    text: Geist
    code: Geist Mono
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest

extra_css:
  - stylesheets/vercel.css

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting started:
      - Installation: installation.md
      - Getting started: getting-started.md
      - Configuration: configuration.md
      - Execution modes: execution-modes.md
      - Examples: examples.md
  - Operations:
      - Deployment: deployment.md
      - Backup & restore: backup-restore.md
      - Staging clones: staging-clone.md
      - Rollback: rollback.md
      - Environments: environments.md
      - Doctor: doctor.md
      - Disaster recovery: disaster-recovery.md
      - Odoo versions: odoo-versions.md
      - Migration & upgrades: migration.md
  - Platform:
      - Web UI: web-ui.md
      - API: api.md
      - Runner architecture: runner-architecture.md
      - Domains & SSL: domains-ssl.md
      - Catalog: catalog.md
  - Security:
      - Security notes: security.md
      - RBAC: rbac.md
  - Project:
      - Contributing: CONTRIBUTING.md
      - Code of conduct: CODE_OF_CONDUCT.md
      - Security policy: SECURITY.md

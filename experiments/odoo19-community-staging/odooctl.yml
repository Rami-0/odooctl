project:
  name: odoo19-community-staging-experiment
  odoo_version: "19.0"

runtime:
  type: docker_compose
  compose_file: docker-compose.yml
  reverse_proxy: none

postgres:
  host: localhost
  port: 5432
  user: odoo
  password_env: ODOO_DB_PASSWORD

backups:
  local_path: backups

odoo:
  image: odoo:19.0
  config_path: ./odoo.conf
  service: odoo
  addons_paths:
    - /mnt/extra-addons

environments:
  production:
    branch: main
    domain: localhost:18069
    db_name: odoo_prod
    filestore_path: ./filestore/odoo_prod
    update_modules:
      - base
  staging:
    branch: staging
    domain: localhost:18070
    db_name: odoo_staging
    filestore_path: ./filestore/odoo_staging
    clone_from: production
    sanitize: true
    update_modules:
      - base

sanitization:
  sql_files:
    - .sanitize/staging.sql
  disable_mail_servers: true
  disable_fetchmail: true
  disable_crons: true
  rewrite_base_url: true
  disable_payment_providers: true

healthcheck:
  path: /web/login
  timeout_seconds: 5
  retries: 12
  interval_seconds: 5

name: Docs

on:
  push:
    branches: [master]
    paths: ['docs/**', 'mkdocs.yml', 'README.md']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build site
        run: |
          pip install mkdocs-material
          # index.md is generated from README.md at build time
          cp README.md docs/index.md
          mkdocs build --strict
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/
      - id: deployment
        uses: actions/deploy-pages@v4
